<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gjimnazi Milot - ID e Maturës</title>
    <link rel="stylesheet" href="ID.css">
</head>
<body>

    <div class="container">
        <div class="card">

            <h1>Gjimnazi Milot</h1>

            <p class="subtitle">
                Kontrollo ID e Maturës Shtetërore 2026
            </p>

            <div class="form-group">
                <label>Emri</label>
                <input type="text" id="emri" placeholder="Shkruaj emrin">
            </div>

            <div class="form-group">
                <label>Mbiemri</label>
                <input type="text" id="mbiemri" placeholder="Shkruaj mbiemrin">
            </div>

            <div class="form-group">
                <label>ID e kartës së identitetit</label>
                <input type="text" id="nid" placeholder="Shkruaj NID">
            </div>

            <button onclick="kerkoID()">
                KËRKO ID E MATURËS
            </button>

            <div id="rezultati"></div>

        </div>
    </div>

    <script>
        function kerkoID() {

            const emri = document.getElementById("emri").value.trim();
            const mbiemri = document.getElementById("mbiemri").value.trim();
            const nid = document.getElementById("nid").value.trim();

            const rezultati = document.getElementById("rezultati");

            if(emri === "" || mbiemri === "" || nid === ""){

                rezultati.className = "error";

                rezultati.innerHTML = `
                    Plotëso të gjitha fushat!
                `;

                return;
            }

            const idMatures =
                "M2026-" +
                Math.floor(100000 + Math.random() * 900000);

            rezultati.className = "success";

            rezultati.innerHTML = `
                <h2>ID u gjenerua me sukses</h2>

                <p><strong>${emri} ${mbiemri}</strong></p>

                <p>NID: ${nid}</p>

                <h1 class="id-final">${idMatures}</h1>
            `;
        }
    </script>

</body>
</html>
