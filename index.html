<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gjimnazi Milot - ID e Maturës</title>
    <link rel="stylesheet" href="ID.css">
</head>
<body>

<div class="container">

    <h1>Gjimnazi Milot</h1>

    <div class="subtitle">
        Kontrollo ID e Maturës Shtetërore 2026
        <br>
        <small style="color: #e67e22; font-size: 11px;">(Përdorni shkronjat Ë dhe Ç nëse i keni në emër/mbiemër)</small>
    </div>

    <label>Emri</label>
    <input type="text" id="emri" placeholder="Shkruaj emrin">

    <label>Mbiemri</label>
    <input type="text" id="mbiemri" placeholder="Shkruaj mbiemrin">

    <label>ID e kartës së identitetit</label>
    <input type="text" id="nid" placeholder="Shkruaj NID (psh. K85...)">

    <button onclick="kerkoID()">
        KËRKO ID E MATURËS
    </button>

    <div id="rezultati"></div>

</div>

<script>
async function kerkoID() {
    const emri = document.getElementById("emri").value.trim();
    const mbiemri = document.getElementById("mbiemri").value.trim();
    const nid = document.getElementById("nid").value.trim();
    const rezultati = document.getElementById("rezultati");

    // Pastrojmë klasat dhe stilin e vjetër përpara kërkesës së re
    rezultati.className = ""; 
    rezultati.innerHTML = "";

    if (emri === "" || mbiemri === "" || nid === "") {
        rezultati.className = "tekst-kuq"; 
        rezultati.innerHTML = "Ju lutem plotësoni të gjitha fushat!";
        return;
    }

    try {
        // Kërkesa dërgohet ekzaktesisht te endpoint-i /kerkoID
        const response = await fetch("https://id-matura.onrender.com/kerkoID", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ emri, mbiemri, nid })
        });

        const data = await response.json();

        if (data.success) {
            rezultati.className = "kuti-jeshile"; 
            rezultati.innerHTML = `
                ID e Maturës u gjet:
                <br><br>
                <strong>${data.id}</strong>
            `;
        } else {
            rezultati.className = "tekst-kuq"; 
            rezultati.innerHTML = data.message;
        }

    } catch (error) {
        rezultati.className = "tekst-kalter"; 
        rezultati.innerHTML = "Gabim në lidhjen me serverin!";
    }
}
</script>

</body>
</html>
